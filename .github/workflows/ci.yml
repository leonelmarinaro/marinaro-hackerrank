name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: |
          FILES=$(gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "Estos archivos necesitan gofmt:"
            echo "$FILES"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
